global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'routemaster_api'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8000']  # For local backend

  - job_name: 'grafana'
    metrics_path: /metrics
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9101']  # JMX metrics if configured

  - job_name: 'scraper'
    metrics_path: /metrics
    static_configs:
      - targets: ['scraper:8001']

  - job_name: 'route_service'
    metrics_path: /metrics
    static_configs:
      - targets: ['route_service:8002']

  - job_name: 'rl_service'
    metrics_path: /metrics
    static_configs:
      - targets: ['rl_service:8003']
