apiVersion: 1
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Postgres
    orgId: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
  - name: Postgres
    type: postgres
    access: proxy
    url: postgres://postgres:postgres@db:5432/postgres
    database: postgres
    user: postgres
    secureJsonData: {}
    jsonData:
      sslmode: disable
    isDefault: true
    editable: true
