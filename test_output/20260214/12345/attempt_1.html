<style>
  :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --link-color: #0066cc;
      --highlight-color: #ff9800;
      --secondary-text-color: #757575;
      --heading-color: #2c3e50;
    }

    body.dark {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --link-color: #8ab4f8;
      --highlight-color: #ffb74d;
      --secondary-text-color: #b0b0b0;
      --heading-color: #ecf0f1;
      --panel-bg: #1e1e1e;
      --button-bg: #333333;
      --button-hover: #444444;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: Arial, sans-serif;
      margin: 0;
      /*padding: 2rem;*/
      transition: background-color 0.3s, color 0.3s;
    }

    h1, h2 {
      color: var(--heading-color);
    }

    p {
      color: var(--secondary-text-color);
      line-height: 1.6;
    }

    a {
      color: var(--link-color);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
/*
    .container {
      max-width: 800px;
      margin: auto;
      text-align: center;
    }
*/
    .highlight {
      color: var(--highlight-color);
      font-weight: bold;
    }

    /* Toggle switch style */
    .switch-wrapper {
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .switch-label {
      margin-right: 10px;
      font-size: 1rem;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

<style>
    .floating-accessibility {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }

    #accessibilityToggle {
      background-color: #4729A3;
      color: white;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    #accessibilityToggle:hover {
      background-color: #351e7d;
    }

    .accessibility-icon {
      width: 24px;
      height: 24px;
    }

    .accessibility-panel {
      display: none;
      position: absolute;
      top: 60px;
      right: 0;
      background: var(--panel-bg);
      color: var(--text-color);
      min-width: 250px;
      max-width: 480px;
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .accessibility-panel.show {
      display: block;
    }

    .accessibility-panel h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .accessibility-panel ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .accessibility-panel li {
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .accessibility-panel button {
      background: var(--button-bg);
      color: var(--text-color);
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .accessibility-panel button:hover {
      background: var(--button-hover);
    }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4729A3;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .switch-label {
      margin-right: 10px;
      font-size: 14px;
    }
	
	.button-row {
	  display: flex;
	  gap: 10px;
	}
	
	.button-row.single .access-btn {

	}
