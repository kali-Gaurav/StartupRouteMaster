version: '3.8'

services:
  # Main Backend API (Consolidated)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: routemaster_backend
    restart: unless-stopped
    ports:
      - "8000:8000" # Main API & Gateway
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_KEY=${VITE_SUPABASE_ANON_KEY}
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - routemaster_network

  redis:
    image: redis/redis-stack:latest
    container_name: routemaster_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - routemaster_network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: routemaster_frontend
    ports:
      - "5173:5173"
    environment:
      - RAILWAY_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - routemaster_network

networks:
  routemaster_network:
    driver: bridge
