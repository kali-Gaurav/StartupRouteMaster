syntax = "proto3";

package booking;

import "google/protobuf/timestamp.proto";

service BookingService {
  rpc InitiateBooking (BookingRequest) returns (BookingResponse);
  rpc GetBookingStatus (StatusRequest) returns (StatusResponse);
  rpc CancelBooking (CancelRequest) returns (CancelResponse);
}

message BookingRequest {
  string user_id = 1;
  string trip_id = 2;  // CHANGED from train_id
  string from_stop_id = 3;
  string to_stop_id = 4;
  google.protobuf.Timestamp travel_date = 5;
  string quota_type = 6;
  string class_type = 7;
  repeated Passenger passengers = 8;
  string payment_method = 9;  // CHANGED from payment_method_id
  double total_amount = 10;  // NEW: total booking amount
  string preferences = 11;  // NEW: JSON preferences
}

message Passenger {
  string name = 1;
  int32 age = 2;
  string gender = 3;
  string berth_preference = 4;
}

message BookingResponse {
  bool success = 1;  // NEW: explicit success flag
  string pnr = 2;
  string booking_id = 3;  // NEW: booking identifier
  string status = 4; // PENDING, CONFIRMED, WAITLIST, FAILED
  double total_amount = 5;
  string transaction_id = 6;
  string message = 7;  // NEW: status message
  string error_message = 8;
}

message StatusRequest {
  string pnr = 1;
}

message StatusResponse {
  string pnr = 1;
  string status = 2;
  string payment_status = 3;  // NEW: separate payment status
  repeated string seat_numbers = 4;
  google.protobuf.Timestamp booking_time = 5;
  int64 created_at_timestamp = 6;  // NEW: created at timestamp
  string message = 7;  // NEW: status message
}

message CancelRequest {
  string pnr = 1;
  string reason = 2;
}

message CancelResponse {
  bool success = 1;
  string pnr = 2;
  double refund_amount = 3;
  double cancellation_charge = 4;  // NEW: cancellation fee
  string cancellation_id = 5;
  string message = 6;  // NEW: status message
}
