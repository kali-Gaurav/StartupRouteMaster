name: Backend — CI & publish container

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest -q

  publish:
    name: Build & publish container image
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/startupv2-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/startupv2-backend:latest

      - name: Artifact info
        run: echo "Published image: ghcr.io/${{ github.repository_owner }}/startupv2-backend:${{ github.sha }}"

      - name: Railway note
        run: |
          echo "To enable automatic Railway deploys:"
          echo "  1) In Railway, connect this GitHub repo or configure a container image pull from GHCR." 
          echo "  2) If you want an Action that calls Railway directly, add RAILWAY_API_KEY as a repo secret and tell me and I'll add the step."
