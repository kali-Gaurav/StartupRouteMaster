name: API smoke tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=5s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1" --health-interval=5s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Wait for Postgres & Redis
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break || sleep 1
          done
          redis-cli -h localhost ping

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run unit tests
        run: |
          echo "Running pytest (backend unit tests)..."
          pytest -q backend/tests

      - name: Start backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          REDIS_URL: redis://localhost:6379/0
        run: |
          nohup uvicorn backend.app:app --host 0.0.0.0 --port 8000 &>/tmp/uvicorn.log &
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/health || true)
            if [ "$status" = "200" ]; then
              echo "backend is healthy"
              break
            fi
            sleep 1
          done
          curl http://127.0.0.1:8000/health

      - name: Start transient Prometheus (CI) and verify target registration
        run: |
          cat > /tmp/prom-ci.yml <<'YML'
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'routemaster_local'
              static_configs:
                - targets: ['host.docker.internal:8000','127.0.0.1:8000']
          YML

          # Run Prometheus container using the temporary config
          docker run -d --name prometheus-ci -p 9090:9090 -v /tmp/prom-ci.yml:/etc/prometheus/prometheus.yml prom/prometheus:latest
          for i in $(seq 1 30); do
            wget -qO- http://localhost:9090/-/ready && break || sleep 1
          done
          echo "Prometheus ready"

          # Wait until Prometheus registers the target as UP
          for i in $(seq 1 30); do
            up=$(curl -s http://localhost:9090/api/v1/targets | jq -r '.data.activeTargets[] | select(.discoveredLabels.__address__=="127.0.0.1:8000" or .discoveredLabels.__address__=="host.docker.internal:8000") | .health' | head -n1 || true)
            if [ "$up" = "up" ] || [ "$up" = "UP" ]; then
              echo "Prometheus target is UP"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:9090/api/v1/targets | jq '.data.activeTargets' || true

      - name: Run smoke tests (curl + simple assertions)
        run: |
          set -euo pipefail

          echo "-> /metrics (prometheus endpoint)"
          curl -sSf http://127.0.0.1:8000/metrics | head -n 20

          echo "-> /health"
          curl -f http://127.0.0.1:8000/health

          echo "-> /chat"
          chat_resp=$(curl -s -X POST http://127.0.0.1:8000/chat -H "Content-Type: application/json" -d '{"message":"Find trains from Delhi to Mumbai","session_id":"ci-test"}')
          echo "$chat_resp"
          echo "$chat_resp" | python -c 'import sys,json; d=json.load(sys.stdin); assert "reply" in d and "session_id" in d; print("chat OK")'

          echo "-> /api/search"
          search_resp=$(curl -s -X POST http://127.0.0.1:8000/api/search -H "Content-Type: application/json" -d '{"source":"New Delhi","destination":"Mumbai Central","date":"2026-02-14"}')
          echo "$search_resp"
          echo "$search_resp" | python -c 'import sys,json; d=json.load(sys.stdin); assert "routes" in d; print("search OK")'

          echo "-> Prometheus targets (verify backend target registered)"
          curl -s http://localhost:9090/api/v1/targets | jq '.data.activeTargets[] | {job: .labels.job, address: .discoveredLabels.__address__, health: .health}' || true
