name: RMA Nightly Validation

on:
  schedule:
    - cron: '0 2 * * *' # every day at 02:00 UTC
  workflow_dispatch: {}

jobs:
  nightly-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r routemaster_agent/requirements.txt
          playwright install chromium

      - name: Run RMA QA TestRunner (sample trains)
        id: run_tests
        run: |
          python -m routemaster_agent.cli run --trains 11603 12345 --concurrency 2 --max-attempts 3 --strict
        continue-on-error: true

      - name: Run pytest live NTES test
        if: always()
        env:
          RMA_RUN_LIVE: '1'
        run: |
          pytest -q routemaster_agent/tests/test_ntes_live.py::test_runner_live_integration -q
        continue-on-error: true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rma-testing-artifacts
          path: |
            test_output/**
            logs/**

      - name: Post result summary
        if: always()
        run: |
          echo "Nightly RMA validation completed. Artifacts uploaded."

      - name: Slack notification (optional)
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.RMA_SLACK_WEBHOOK }}
        run: |
          python - <<'PY'
          import os, json
          p = 'logs/testing_metrics_$(date +%Y%m%d).json'
          if not os.path.exists(p):
              print('no metrics file to report')
              raise SystemExit(0)
          failed = []
          for line in open(p):
              j = json.loads(line)
              if not j.get('validation_passed'):
                  failed.append(j)
          text = f"RMA nightly: tested {len(open(p).read().strip().splitlines())} trains — {len(failed)} failed"
          if failed:
              text += "\nFailed trains: " + ", ".join(str(x['train_number']) for x in failed)
          import requests
          resp = requests.post(os.environ['SLACK_WEBHOOK'], json={'text': text})
          print('slack status', resp.status_code)
          PY